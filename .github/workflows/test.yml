name: test

# The verifier is the trust anchor: the audit-of-record claim rests on
# anyone being able to recompute bundles offline with this CLI. This
# workflow runs vet + build + the full test suite (canonical hash
# known-answer, deny-receipt, and the production golden-bundle test)
# on every push and PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
