name: Release

# Builds the verdifax-verify CLI for all supported platforms and uploads
# each binary to the GitHub release that triggered this workflow.
#
# Trigger: pushing a tag matching v*. Example to cut a release:
#
#   git tag v0.1.5 -m "v0.1.5 — short description"
#   git push origin v0.1.5
#
# Two-stage shape (avoids the race condition that broke v0.1.4):
#
#   1. create-release  runs ONCE, creates the GitHub release for the tag.
#   2. build           matrix job, runs FOUR times (one per platform),
#                      each builds its binary and uploads to the existing
#                      release. Because the release already exists by
#                      this point, softprops/action-gh-release@v2 takes
#                      the "upload-only" branch and the jobs do not race.
#
# Naming convention (matches the audit PDF's install commands):
#   verdifax-verify-darwin-amd64
#   verdifax-verify-darwin-arm64
#   verdifax-verify-linux-amd64
#   verdifax-verify-linux-arm64
#
# The names are literal (no $(uname) shell substitution) because the
# audit PDF embeds them as static clickable URLs.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required to create / update the release
  id-token: write  # Cosign keyless signing (Sigstore OIDC identity)

jobs:
  create-release:
    name: Create release for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build verdifax-verify
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" \
            -o dist/verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Generate SHA-256 checksum
        run: |
          cd dist
          sha256sum verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }} \
            > verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: the signature is bound to this workflow's
      # GitHub OIDC identity and recorded on the public Sigstore
      # transparency log. No private key exists to manage or leak.
      # A third party verifies with:
      #
      #   cosign verify-blob \
      #     --certificate <binary>.pem --signature <binary>.sig \
      #     --certificate-identity-regexp '^https://github.com/Verdifax/verdifax-verify/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     <binary>
      - name: Sign binary (Cosign keyless, Sigstore)
        env:
          COSIGN_YES: "true"
        run: |
          cd dist
          cosign sign-blob \
            --output-signature verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.sig \
            --output-certificate verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.pem \
            verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
            dist/verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.sig
            dist/verdifax-verify-${{ matrix.goos }}-${{ matrix.goarch }}.pem
